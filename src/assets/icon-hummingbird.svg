<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>
    <!-- Body 3D gradient — lit from top-left -->
    <linearGradient id="body-lit" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="30%" stop-color="#60a5fa"/>
      <stop offset="60%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Head 3D gradient -->
    <radialGradient id="head-3d" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <!-- Wing primary — translucent with depth -->
    <linearGradient id="wing-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#93c5fd" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Wing secondary -->
    <linearGradient id="wing2-3d" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Tail gradient -->
    <linearGradient id="tail-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Beak metallic -->
    <linearGradient id="beak-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="40%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="amb2" cx="55%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <!-- Soft glow on bird -->
    <filter id="bird-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>

  <!-- Ambient glow -->
  <ellipse cx="280" cy="240" rx="180" ry="170" fill="url(#amb2)"/>

  <!-- Hummingbird — 3D sculpted, display-quality -->
  <g transform="translate(248, 252) scale(1.25)" filter="url(#drop)">

    <!-- Tail feathers with volume -->
    <path d="M -28 55 C -55 85, -85 110, -115 108 C -110 95, -85 72, -55 50 C -70 95, -100 130, -130 128 C -118 112, -82 78, -42 48" fill="url(#tail-3d)"/>
    <!-- Tail highlight -->
    <path d="M -28 55 C -55 85, -85 110, -115 108 C -110 95, -85 72, -55 50" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>

    <!-- Body — 3D ellipsoid -->
    <ellipse cx="2" cy="28" rx="44" ry="36" fill="url(#body-lit)" transform="rotate(-18)"/>
    <!-- Body rim light (right edge) -->
    <ellipse cx="30" cy="15" rx="8" ry="28" fill="#93c5fd" opacity="0.15" transform="rotate(-18, 30, 15)"/>
    <!-- Body shadow (bottom) -->
    <ellipse cx="-5" cy="50" rx="30" ry="10" fill="#0c1a3a" opacity="0.3"/>

    <!-- Upper wing — sculpted with feather detail -->
    <path d="M -8 8 C -35 -35, -80 -75, -105 -92
             C -80 -82, -25 -60, 8 -28
             C 22 -48, 55 -88, 68 -108
             C 60 -80, 38 -42, 18 -8 Z" fill="url(#wing-3d)"/>
    <!-- Wing feather lines -->
    <path d="M -8 8 C -35 -35, -80 -75, -105 -92" fill="none" stroke="#bfdbfe" stroke-width="0.8" opacity="0.5"/>
    <path d="M 0 -5 C 18 -40, 48 -78, 58 -98" fill="none" stroke="#bfdbfe" stroke-width="0.8" opacity="0.4"/>
    <!-- Wing highlight streak -->
    <path d="M -5 5 C -25 -25, -60 -55, -78 -68" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

    <!-- Lower wing -->
    <path d="M -3 14 C -30 -8, -68 -40, -88 -52
             C -65 -42, -20 -18, 8 4 Z" fill="url(#wing2-3d)"/>

    <!-- Head — sphere with 3D shading -->
    <circle cx="56" cy="-6" r="23" fill="url(#head-3d)"/>
    <!-- Head specular highlight -->
    <ellipse cx="48" cy="-16" rx="10" ry="7" fill="white" opacity="0.18" transform="rotate(-20, 48, -16)"/>

    <!-- Eye — glossy 3D -->
    <circle cx="63" cy="-11" r="6" fill="#050d1a"/>
    <circle cx="63" cy="-11" r="5.5" fill="#0a1628"/>
    <!-- Eye shine -->
    <circle cx="65" cy="-13.5" r="2.2" fill="white" opacity="0.85"/>
    <circle cx="60.5" cy="-9" r="1" fill="white" opacity="0.4"/>

    <!-- Beak — long, metallic, 3D -->
    <path d="M 77 -9 L 138 -22 L 77 -1 Z" fill="url(#beak-3d)"/>
    <!-- Beak highlight -->
    <path d="M 80 -8 L 125 -20" fill="none" stroke="white" stroke-width="0.8" opacity="0.35"/>
    <!-- Beak shadow underside -->
    <path d="M 77 -1 L 130 -18" fill="none" stroke="#1e3a8a" stroke-width="0.5" opacity="0.4"/>

    <!-- Chest iridescence -->
    <ellipse cx="28" cy="18" rx="20" ry="24" fill="#60a5fa" opacity="0.12" transform="rotate(-18)"/>
    <!-- Chest specular -->
    <ellipse cx="20" cy="8" rx="8" ry="12" fill="white" opacity="0.08" transform="rotate(-18, 20, 8)"/>
  </g>

  <!-- Floor reflection -->
  <g opacity="0.08" transform="translate(0, 500) scale(1, -0.2)">
    <ellipse cx="270" cy="250" rx="100" ry="80" fill="#3b82f6"/>
  </g>

  <!-- Sparkle accents — like floating particles -->
  <g>
    <circle cx="395" cy="115" r="3.5" fill="#93c5fd" opacity="0.8"/>
    <circle cx="405" cy="125" r="1.5" fill="#dbeafe" opacity="0.6"/>
    <circle cx="115" cy="380" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="380" cy="400" r="2" fill="#bfdbfe" opacity="0.4"/>
    <circle cx="140" cy="130" r="2" fill="#93c5fd" opacity="0.3"/>
  </g>
</svg>
