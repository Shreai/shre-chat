<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>
    <!-- 3D metallic S gradient -->
    <linearGradient id="s-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="25%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="75%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <!-- Shadow/depth side -->
    <linearGradient id="s-depth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <!-- Top highlight -->
    <linearGradient id="s-highlight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Floor reflection -->
    <linearGradient id="reflect" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="amb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Inner glow filter -->
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#93c5fd" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Ambient glow behind S -->
  <ellipse cx="256" cy="260" rx="160" ry="160" fill="url(#amb-glow)"/>

  <!-- 3D S — depth/extrusion layer (offset copies for thickness) -->
  <g filter="url(#shadow)">
    <!-- Extrusion layers (back to front) -->
    <path d="
      M 306 155
      C 286 118, 218 98, 178 112
      C 138 128, 118 168, 125 202
      C 132 240, 172 260, 218 276
      C 264 292, 318 312, 326 358
      C 334 404, 300 448, 248 460
      C 206 470, 162 456, 148 434
    " fill="none" stroke="url(#s-depth)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"
      transform="translate(6, 6)"/>

    <!-- Main S face -->
    <path d="
      M 306 155
      C 286 118, 218 98, 178 112
      C 138 128, 118 168, 125 202
      C 132 240, 172 260, 218 276
      C 264 292, 318 312, 326 358
      C 334 404, 300 448, 248 460
      C 206 470, 162 456, 148 434
    " fill="none" stroke="url(#s-face)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Highlight edge (top-left lit) -->
    <path d="
      M 306 155
      C 286 118, 218 98, 178 112
      C 138 128, 118 168, 125 202
      C 132 240, 172 260, 218 276
      C 264 292, 318 312, 326 358
      C 334 404, 300 448, 248 460
      C 206 470, 162 456, 148 434
    " fill="none" stroke="url(#s-highlight)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"
      transform="translate(-2, -2)"/>
  </g>

  <!-- Specular highlights — bright spots on curves -->
  <ellipse cx="170" cy="160" rx="18" ry="8" fill="white" opacity="0.25" transform="rotate(-30, 170, 160)"/>
  <ellipse cx="290" cy="330" rx="16" ry="7" fill="white" opacity="0.2" transform="rotate(-25, 290, 330)"/>
  <ellipse cx="220" cy="270" rx="12" ry="5" fill="white" opacity="0.15" transform="rotate(10, 220, 270)"/>

  <!-- Floor reflection (mirrored, faded) -->
  <g opacity="0.12" transform="translate(0, 490) scale(1, -0.25)">
    <path d="
      M 306 155
      C 286 118, 218 98, 178 112
      C 138 128, 118 168, 125 202
      C 132 240, 172 260, 218 276
      C 264 292, 318 312, 326 358
      C 334 404, 300 448, 248 460
      C 206 470, 162 456, 148 434
    " fill="none" stroke="url(#reflect)" stroke-width="48" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle accents -->
  <g opacity="0.8">
    <circle cx="365" cy="120" r="4" fill="#93c5fd"/>
    <circle cx="375" cy="128" r="2" fill="#bfdbfe"/>
    <circle cx="140" cy="480" r="3" fill="#60a5fa" opacity="0.5"/>
  </g>
</svg>
