<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Head -->
  <circle cx="512" cy="224" r="104" stroke="white" stroke-width="44" fill="none"/>

  <!-- Torso / seat back (upper body) -->
  <rect x="428" y="356" width="168" height="296" rx="28" fill="white"/>

  <!-- Seat base (hips/thighs) -->
  <rect x="356" y="620" width="312" height="104" rx="28" fill="white"/>

  <!-- Left leg -->
  <rect x="384" y="712" width="88" height="192" rx="28" fill="white"/>

  <!-- Right leg -->
  <rect x="552" y="712" width="88" height="192" rx="28" fill="white"/>

  <!-- Seatbelt diagonal strap: left shoulder to right hip -->
  <line
    x1="450" y1="370"
    x2="668" y2="690"
    stroke="white"
    stroke-width="56"
    stroke-linecap="round"
  />

  <!-- Lap belt: horizontal across hips -->
  <line
    x1="356" y1="668"
    x2="668" y2="668"
    stroke="white"
    stroke-width="44"
    stroke-linecap="round"
  />

  <!-- Buckle at junction -->
  <rect x="632" y="640" width="72" height="56" rx="12" fill="white"/>
</svg>
