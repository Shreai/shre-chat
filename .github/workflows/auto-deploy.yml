name: Auto Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test-build
    env:
      DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
    steps:
      - name: Validate production deploy target
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Production deploy target is missing. Set DEPLOY_HOOK_URL before merging to main/master."
            exit 1
          fi

      - name: Trigger deploy hook
        run: |
          curl -fsSL -X POST "$DEPLOY_HOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"source":"shre-chat","event":"auto-deploy","environment":"production"}'
